<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎙️ 会议纪要录音器</title>
<style>
  :root {
    --bg: #0f0f0f;
    --card-bg: #1a1a1a;
    --surface: #242424;
    --border: #333;
    --text: #e8e8e8;
    --text-dim: #888;
    --primary: #5b9aff;
    --primary-hover: #4a7de0;
    --danger: #ff4757;
    --danger-hover: #e03848;
    --success: #2ed573;
    --warning: #ffa502;
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 24px;
  }
  .container {
    max-width: 720px;
    width: 100%;
  }
  .header { text-align: center; padding: 24px 0 32px; }
  .header h1 {
    font-size: 28px; font-weight: 700;
    background: linear-gradient(135deg, #5b9aff, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header p { color: var(--text-dim); font-size: 14px; margin-top: 6px; }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
  }
  .card-title { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: var(--text); }

  .input-group { display: flex; gap: 8px; align-items: center; }
  .input-group input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 13px;
    outline: none;
    transition: border 0.2s;
  }
  .input-group input:focus { border-color: var(--primary); }
  .input-group input::placeholder { color: #555; }

  .btn {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-hover); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: var(--danger-hover); }
  .btn-success { background: var(--success); color: #000; }
  .btn-success:hover { opacity: 0.85; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-outline:hover { border-color: var(--text-dim); }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .recorder-controls { display: flex; align-items: center; justify-content: center; gap: 16px; flex-wrap: wrap; }

  .record-btn {
    width: 80px; height: 80px;
    border-radius: 50%;
    border: 3px solid var(--danger);
    background: transparent;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    flex-shrink: 0;
  }
  .record-btn::after {
    content: '';
    display: block;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--danger);
    margin: auto;
    transition: all 0.3s;
  }
  .record-btn.recording { animation: pulse 1.5s infinite; }
  .record-btn.recording::after { border-radius: 4px; width: 24px; height: 24px; }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.5); }
    50% { box-shadow: 0 0 0 16px rgba(255, 71, 87, 0); }
    100% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0); }
  }

  .recorder-status { text-align: center; margin-top: 12px; font-size: 13px; color: var(--text-dim); line-height: 1.6; }

  .clip-list { max-height: 200px; overflow-y: auto; }
  .clip-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px; background: var(--surface); border-radius: 8px;
    margin-bottom: 6px; font-size: 13px;
  }
  .clip-item .clip-name { color: var(--text-dim); }
  .clip-item .clip-size { color: var(--text-dim); font-size: 12px; }

  .progress-bar { height: 4px; background: var(--surface); border-radius: 2px; overflow: hidden; margin: 12px 0; }
  .progress-bar .fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), #a78bfa);
    width: 0%;
    transition: width 0.3s;
  }
  .progress-message { font-size: 13px; color: var(--text-dim); text-align: center; padding: 4px 0; }

  .transcript-box {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 16px; max-height: 300px; overflow-y: auto;
    font-size: 13px; line-height: 1.6; color: var(--text); white-space: pre-wrap;
  }

  .minutes-content {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 20px; font-size: 14px; line-height: 1.8; overflow-x: auto;
  }
  .minutes-content h1, .minutes-content h2, .minutes-content h3 { margin-top: 16px; margin-bottom: 8px; }
  .minutes-content h2 { font-size: 18px; }
  .minutes-content h3 { font-size: 16px; }
  .minutes-content ul, .minutes-content ol { padding-left: 20px; margin: 8px 0; }
  .minutes-content li { margin: 4px 0; }
  .minutes-content p { margin: 8px 0; }
  .minutes-content strong { color: var(--primary); }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--text-dim); font-size: 14px; }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

  .flex-between { display: flex; justify-content: space-between; align-items: center; }
  .mb-8 { margin-bottom: 8px; }
  .mb-16 { margin-bottom: 16px; }
  .mt-8 { margin-top: 8px; }
  .mt-16 { margin-top: 16px; }
  .gap-8 { gap: 8px; }
  .hidden { display: none; }
  .text-center { text-align: center; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>🎙️ 会议纪要录音器</h1>
    <p>分段录音 · 自动合并 · AI 生成会议纪要</p>
  </div>

  <!-- API Key -->
  <div class="card">
    <div class="card-title">🔑 API 密钥</div>
    <div class="mb-8">
      <label style="font-size:13px;color:var(--text-dim);display:block;margin-bottom:4px;">模力方舟 API Key（语音识别用）</label>
      <div class="input-group">
        <input type="password" id="moarkApiKey" placeholder="sk-..." />
        <button class="btn btn-primary btn-sm" onclick="saveKeys()">保存</button>
      </div>
    </div>
    <div>
      <label style="font-size:13px;color:var(--text-dim);display:block;margin-bottom:4px;">DeepSeek API Key（纪要生成，选填）</label>
      <div class="input-group">
        <input type="password" id="deepseekApiKey" placeholder="留空用服务端默认" />
      </div>
    </div>
    <div id="keyStatus" style="font-size:12px;color:var(--success);margin-top:4px;"></div>
  </div>

  <!-- Recording -->
  <div class="card">
    <div class="flex-between mb-16">
      <div class="card-title" style="margin-bottom:0;">🎤 录音</div>
      <button class="btn btn-sm btn-outline" onclick="clearClips()" id="clearBtn" style="display:none;">🗑️ 清空</button>
    </div>

    <div class="recorder-controls">
      <button class="record-btn" id="recordBtn" onclick="toggleRecording()"></button>
      <div>
        <div id="timerDisplay" style="font-size:36px;font-weight:300;font-variant-numeric:tabular-nums;letter-spacing:2px;">00:00</div>
        <div id="statusText" class="recorder-status">点击红色按钮开始录音</div>
      </div>
    </div>

    <div class="mt-16">
      <div class="flex-between mb-8">
        <span style="font-size:13px;color:var(--text-dim);">已录片段：<span id="clipCount">0</span></span>
        <span style="font-size:12px;color:var(--text-dim);" id="totalDuration">总时长：0:00</span>
      </div>
      <div class="clip-list" id="clipList">
        <div class="empty-state">
          <div class="icon">🎙️</div>
          <div>点击红色按钮开始录音</div>
          <div style="font-size:12px;margin-top:4px;">首次点击会请求麦克风权限</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Process -->
  <div class="card">
    <div class="flex-between mb-16">
      <div class="card-title" style="margin-bottom:0;">📝 生成会议纪要</div>
      <button class="btn btn-primary" id="processBtn" onclick="processAll()" disabled>🚀 开始处理</button>
    </div>
    <div id="progressSection" class="hidden">
      <div class="progress-bar"><div class="fill" id="progressFill"></div></div>
      <div class="progress-message" id="progressMessage">就绪</div>
    </div>
  </div>

  <!-- Transcript -->
  <div class="card" id="transcriptCard" style="display:none;">
    <div class="flex-between mb-8">
      <div class="card-title" style="margin-bottom:0;">📄 转写文本</div>
      <button class="btn btn-sm btn-outline" onclick="copyText('transcriptContent')">📋 复制</button>
    </div>
    <div class="transcript-box" id="transcriptContent"></div>
  </div>

  <!-- Minutes -->
  <div class="card" id="minutesCard" style="display:none;">
    <div class="flex-between mb-8">
      <div class="card-title" style="margin-bottom:0;">📋 会议纪要</div>
      <div>
        <button class="btn btn-sm btn-outline" onclick="copyText('minutesContent')">📋 复制</button>
        <button class="btn btn-sm btn-outline" onclick="downloadMinutes()">⬇️ 下载</button>
      </div>
    </div>
    <div class="minutes-content" id="minutesContent"></div>
    <div class="mt-8" id="desktopLink"></div>
  </div>

  <div class="text-center" style="padding:24px 0;color:var(--text-dim);font-size:12px;">
    录音数据仅保存在本地 · ASR 通过模力方舟 API 处理 · 纪要通过 DeepSeek 生成
  </div>
</div>

<script>
// ========== State ==========
var sessionId = crypto.randomUUID().slice(0, 8);
var mediaStream = null;
var mediaRecorder = null;
var audioChunks = [];
var isRecording = false;
var recorderReady = false;
var recordingTimer = null;
var secondCount = 0;
var clips = [];

// ========== 请求麦克风权限 + 初始化 ==========
function requestMicPermission() {
  var btn = document.getElementById('recordBtn');
  var statusEl = document.getElementById('statusText');

  if (recorderReady) return Promise.resolve(true);

  statusEl.textContent = '⏳ 正在请求麦克风权限...';

  return navigator.mediaDevices.getUserMedia({ audio: true })
    .then(function(stream) {
      mediaStream = stream;

      var mimeType = 'audio/webm';
      if (MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) {
        mimeType = 'audio/webm;codecs=opus';
      }

      mediaRecorder = new MediaRecorder(mediaStream, { mimeType: mimeType });

      mediaRecorder.ondataavailable = function(e) {
        if (e.data.size > 0) audioChunks.push(e.data);
      };

      mediaRecorder.onstop = function() {
        if (audioChunks.length === 0) return;
        var blob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
        audioChunks = [];
        uploadClip(blob);
      };

      recorderReady = true;
      statusEl.textContent = '✅ 麦克风已就绪，点击开始录音';
      return true;
    })
    .catch(function(err) {
      statusEl.innerHTML = '❌ 麦克风权限被拒绝。<br><span style="font-size:12px;color:#aaa;">请检查：浏览器地址栏左侧 🔒 → 网站设置 → 麦克风 → 允许，然后刷新页面</span>';
      console.error(err);
      return false;
    });
}

// ========== Recording ==========
var lastClickTime = 0;
function toggleRecording() {
  var now = Date.now();
  if (now - lastClickTime < 600) return;
  lastClickTime = now;

  if (!isRecording) {
    startRecording();
  } else {
    stopRecording();
  }
}

function startRecording() {
  if (!recorderReady) {
    requestMicPermission().then(function(ok) {
      if (ok) startRecording();
    });
    return;
  }

  if (mediaRecorder.state === 'recording') return;
  audioChunks = [];
  mediaRecorder.start(250);
  isRecording = true;
  secondCount = 0;

  document.getElementById('recordBtn').classList.add('recording');
  document.getElementById('statusText').textContent = '🔴 录音中... 再次点击停止';
  document.getElementById('timerDisplay').textContent = '00:00';
  document.getElementById('processBtn').disabled = true;

  recordingTimer = setInterval(function() {
    secondCount++;
    document.getElementById('timerDisplay').textContent = formatTime(secondCount);
  }, 1000);
}

function stopRecording() {
  if (!mediaRecorder || mediaRecorder.state !== 'recording') return;
  mediaRecorder.stop();
  isRecording = false;

  document.getElementById('recordBtn').classList.remove('recording');
  document.getElementById('statusText').textContent = '⏹️ 已停止，可再次点击录制下一段';
  document.getElementById('timerDisplay').textContent = '00:00';

  clearInterval(recordingTimer);
  recordingTimer = null;
}

// ========== Upload ==========
function uploadClip(blob) {
  var formData = new FormData();
  var ext = blob.type.includes('webm') ? '.webm' : '.wav';
  formData.append('audio', blob, 'clip_' + (clips.length + 1) + ext);
  formData.append('sessionId', sessionId);
  // 把真实录音时长（秒）传给后端
  formData.append('duration', String(secondCount));

  fetch('/api/upload', { method: 'POST', body: formData })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.success) {
        clips.push({ name: data.clipPath, size: blob.size, duration: (data.duration || 0) });
        updateClipList();
        document.getElementById('processBtn').disabled = false;
        document.getElementById('clearBtn').style.display = '';
      }
    })
    .catch(function(err) { console.error('上传失败:', err); });
}

// ========== UI Updates ==========
function formatTime(secs) {
  var m = Math.floor(secs / 60);
  var s = secs % 60;
  return (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
}

function formatDuration(secs) {
  var m = Math.floor(secs / 60);
  var s = secs % 60;
  return m + ':' + (s < 10 ? '0' : '') + s;
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + 'B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + 'KB';
  return (bytes / (1024*1024)).toFixed(1) + 'MB';
}

function updateClipList() {
  var list = document.getElementById('clipList');
  var count = document.getElementById('clipCount');
  var totalDur = document.getElementById('totalDuration');

  count.textContent = clips.length;

  if (clips.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="icon">🎙️</div><div>点击红色按钮开始录音</div><div style="font-size:12px;margin-top:4px;">首次点击会请求麦克风权限</div></div>';
    totalDur.textContent = '总时长：0:00';
    return;
  }

  var html = '';
  var totalSecs = 0;
  for (var i = 0; i < clips.length; i++) {
    var d = clips[i].duration || 0;
    totalSecs += d;
    html += '<div class="clip-item"><span class="clip-name">🎬 片段 ' + (i + 1) + '</span><span class="clip-size">' + formatDuration(d) + '</span></div>';
  }
  list.innerHTML = html;
  totalDur.textContent = '总时长：' + formatDuration(totalSecs);
}

// ========== Clear ==========
function clearClips() {
  if (clips.length === 0) return;
  if (!confirm('确定清空所有录音片段吗？')) return;

  fetch('/api/clips/' + sessionId, { method: 'DELETE' }).catch(function() {});

  clips = [];
  updateClipList();
  document.getElementById('processBtn').disabled = true;
  document.getElementById('clearBtn').style.display = 'none';
  document.getElementById('transcriptCard').style.display = 'none';
  document.getElementById('minutesCard').style.display = 'none';
  document.getElementById('progressSection').classList.add('hidden');
  sessionId = crypto.randomUUID().slice(0, 8);
}

// ========== Process ==========
function processAll() {
  if (clips.length === 0) return;

  var moarkKey = document.getElementById('moarkApiKey').value.trim();
  var deepseekKey = document.getElementById('deepseekApiKey').value.trim();

  if (!moarkKey) {
    alert('请先填写模力方舟 API Key（语音识别需要）');
    document.getElementById('moarkApiKey').focus();
    return;
  }

  fetch('/api/save-key', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ moarkApiKey: moarkKey, deepseekApiKey: deepseekKey || undefined }),
  }).catch(function() {});

  var processBtn = document.getElementById('processBtn');
  processBtn.disabled = true;
  processBtn.textContent = '⏳ 处理中...';

  document.getElementById('progressSection').classList.remove('hidden');
  setProgress(0, '准备就绪...');
  document.getElementById('transcriptCard').style.display = 'none';
  document.getElementById('minutesCard').style.display = 'none';

  fetch('/api/process', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      sessionId: sessionId,
      moarkApiKey: moarkKey,
      deepseekApiKey: deepseekKey || undefined,
    }),
  })
  .then(function(resp) {
    var reader = resp.body.getReader();
    var decoder = new TextDecoder();
    var transcript = '';
    var minutes = '';

    function readChunk() {
      return reader.read().then(function(result) {
        if (result.done) return;

        var chunk = decoder.decode(result.value);
        var lines = chunk.split('\n');
        for (var i = 0; i < lines.length; i++) {
          var line = lines[i].trim();
          if (!line) continue;
          try {
            var data = JSON.parse(line);
            switch (data.step) {
              case 'merge': setProgress(25, data.message); break;
              case 'asr': setProgress(50, data.message); break;
              case 'summary':
                setProgress(75, data.message);
                transcript = data.transcript;
                break;
              case 'done':
                setProgress(100, '✅ 完成！');
                showResults(data.transcript, data.minutes, data.desktopPath);
                break;
              case 'error':
                setProgress(0, '❌ ' + data.message);
                processBtn.disabled = false;
                processBtn.textContent = '🚀 开始处理';
                alert('处理失败：' + data.message);
                break;
            }
          } catch(e) {}
        }
        return readChunk();
      });
    }

    return readChunk();
  })
  .catch(function(err) {
    setProgress(0, '❌ 请求失败：' + err.message);
    alert('请求失败：' + err.message);
  })
  .then(function() {
    processBtn.disabled = false;
    processBtn.textContent = '🚀 开始处理';
  });
}

function setProgress(pct, msg) {
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressMessage').textContent = msg;
}

function showResults(transcript, minutes, desktopPath) {
  document.getElementById('transcriptContent').textContent = transcript;
  document.getElementById('transcriptCard').style.display = 'block';
  document.getElementById('minutesContent').innerHTML = marked(minutes);
  document.getElementById('minutesCard').style.display = 'block';

  // 显示桌面文件夹入口
  var desktopLink = document.getElementById('desktopLink');
  if (desktopPath) {
    var folderName = desktopPath.split('/').pop();
    var encodedPath = encodeURIComponent(desktopPath);
    desktopLink.innerHTML = '<div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;">'
      + '<span>📁 <strong>' + folderName + '</strong><br><span style="font-size:12px;color:var(--text-dim);">已保存到桌面 <code style="background:#333;padding:1px 6px;border-radius:4px;font-size:11px;">' + desktopPath.replace(/\//g, ' › ') + '</code></span></span>'
      + '<a href="file://' + encodedPath + '" target="_blank" class="btn btn-sm btn-primary" style="text-decoration:none;">📂 打开文件夹</a>'
      + '</div>';
  }
}

// ========== Markdown ==========
function marked(text) {
  if (!text) return '';
  text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  text = text.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  text = text.replace(/^# (.+)$/gm, '<h2>$1</h2>');
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  text = text.replace(/`(.+?)`/g, '<code style="background:#333;padding:2px 6px;border-radius:4px;font-size:13px;">$1</code>');
  text = text.replace(/^- (.+)$/gm, '<li>$1</li>');
  text = text.replace(/(<li>.*?<\/li>(\n|$))+/g, '<ul>$&</ul>');
  text = text.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  text = text.replace(/(<li>.*?<\/li>(\n|$))+/g, '<ol>$&</ol>');
  text = text.replace(/\n\n+/g, '</p><p>');
  text = '<p>' + text + '</p>';
  text = text.replace(/<p>(<[ou]l>)/g, '$1');
  text = text.replace(/(<[ou]l>.*?<\/[ou]l>)<\/p>/g, '$1');
  text = text.replace(/<p><\/p>/g, '');
  text = text.replace(/^---$/gm, '<hr style="border:none;border-top:1px solid var(--border);margin:16px 0;">');
  return text;
}

// ========== Copy & Download ==========
function copyText(elementId) {
  var el = document.getElementById(elementId);
  var textContent = el.tagName === 'DIV' ? el.textContent : el.innerText;
  navigator.clipboard.writeText(textContent).then(function() {
    var orig = event.target.textContent;
    event.target.textContent = '✅ 已复制';
    setTimeout(function() { event.target.textContent = orig; }, 1500);
  });
}

function downloadMinutes() {
  var text = document.getElementById('minutesContent').textContent;
  var blob = new Blob([text], { type: 'text/markdown' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = '\u4f1a\u8bae\u7eaa\u8981_' + new Date().toISOString().slice(0,10) + '.md';
  a.click();
  URL.revokeObjectURL(url);
}

// ========== API Key ==========
function saveKeys() {
  var moarkKey = document.getElementById('moarkApiKey').value.trim();
  if (!moarkKey) { alert('请填写模力方舟 API Key'); return; }

  fetch('/api/save-key', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      moarkApiKey: moarkKey,
      deepseekApiKey: document.getElementById('deepseekApiKey').value.trim() || undefined,
    }),
  }).then(function() {
    document.getElementById('keyStatus').textContent = '✅ API Key 已保存';
    setTimeout(function() { document.getElementById('keyStatus').textContent = ''; }, 2000);
  }).catch(function() {});
}

// ========== 刷新片段时长（从后端 ffprobe 读取真实时长）==========
function refreshMetadata() {
  fetch('/api/metadata/' + sessionId)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.clips && data.clips.length > 0) {
        // 更新 clips 数组中的真实时长
        for (var i = 0; i < data.clips.length; i++) {
          if (clips[i]) clips[i].duration = data.clips[i].duration || clips[i].duration;
        }
        updateClipList();
      }
    }).catch(function() {});
}

// ========== 页面加载 ==========
fetch('/api/load-keys')
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.moarkKey) document.getElementById('moarkApiKey').value = data.moarkKey;
    if (data.deepseekKey) document.getElementById('deepseekApiKey').value = data.deepseekKey;
  })
  .catch(function() {});

// 每新增一个片段后等1秒自动读取真实时长（后端 ffprobe 可能需要时间）
var origUpload = uploadClip;
uploadClip = function(blob) {
  origUpload(blob);
  setTimeout(refreshMetadata, 1000);
};
</script>
